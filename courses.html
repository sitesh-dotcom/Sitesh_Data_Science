<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Courses — Learning Future With Us</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 1.3rem; padding: 1rem 2rem 3rem; max-width: 1100px; margin: 0 auto; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">Learning<span>Future</span> 🤖</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="courses.html" class="active">Courses</a></li>
      <li><a href="fees.html">Fee Structure</a></li>
      <li><a href="login.html">Student Login</a></li>
      <li><a href="backend.html">Backend</a></li>
      <li><a href="helpdesk.html">Help Desk</a></li>
      <li><a href="payment.html">Payment</a></li>
      <li><a href="login.html" class="btn-nav">Enroll Now</a></li>
    </ul>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
  </nav>

  <div class="page-hero">
    <span class="pill pill-yellow">📚 All Programs</span>
    <h1>Our Courses</h1>
    <p>7 expert-crafted courses across 3 major AI learning tracks</p>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="filterCat('all',this)">All Courses</button>
    <button class="tab" onclick="filterCat('foundations',this)">🧠 AI Foundations</button>
    <button class="tab" onclick="filterCat('applied',this)">⚙️ Applied AI</button>
    <button class="tab" onclick="filterCat('advanced',this)">🚀 Advanced AI</button>
  </div>

  <div class="courses-grid" id="coursesGrid"></div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2026 Learning Future With Us · <a href="helpdesk.html" style="color:var(--accent)">Need Help?</a></p>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    function filterCat(cat, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      const grid = document.getElementById('coursesGrid');
      const list = cat === 'all' ? COURSES : COURSES.filter(c => c.cat === cat);
      grid.innerHTML = list.map((c, i) => renderCourseCard(c, i)).join('');
    }

    // Auto-select category from URL param
    const params = new URLSearchParams(window.location.search);
    const initCat = params.get('cat') || 'all';
    const initTab = document.querySelector(`.tab[onclick*="${initCat}"]`) || document.querySelector('.tab');
    filterCat(initCat, initTab);
  </script>
</body>
</html>
